{% extends 'core/base.html' %}

{% block content %}
<h1>Available Pets 🐾</h1>

<ul>
    {% for pet in pets %}
        <li>
            <a href="{% url 'pet_detail' pet.id %}">
                <strong>{{ pet.name }}</strong>
            </a>
            - {{ pet.breed }} ({{ pet.pet_type }})
            <a href="{% url 'apply_for_pet' pet.id %}">Apply</a>
            <a href="{% url 'toggle_favourite' pet.id %}">Favourite</a>
        </li>
    {% endfor %}
</ul>
{% endblock %}
