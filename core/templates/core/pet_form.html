{% extends 'core/base.html' %}

{% block content %}
<h1 class="text-3xl font-bold text-gray-800 mb-6 border-b pb-2">
    {{ title }} 
</h1>

<form method="POST" enctype="multipart/form-data" class="max-w-2xl space-y-4">
    {% csrf_token %}

    {% for field in form %}
        <div>
            <label class="block font-semibold text-gray-700 mb-1">
                {{ field.label }}
            </label>

            {{ field }}

            {% if field.errors %}
                <p class="text-red-500 text-sm mt-1">{{ field.errors }}</p>
            {% endif %}
        </div>
    {% endfor %}

    <div class="flex gap-3 pt-4">
        <button type="submit"
                class="bg-pink-500 text-white px-5 py-2 rounded-lg hover:bg-pink-600">
            Save
        </button>

        <a href="{% url 'pet_list' %}"
           class="bg-gray-100 text-gray-700 px-5 py-2 rounded-lg hover:bg-gray-200">
            Cancel
        </a>
    </div>
</form>
{% endblock %}
