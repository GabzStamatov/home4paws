{% extends 'core/base.html' %}

<h1>My Favourite Pets</h1>

<ul>
    {% for favourite in favourites %}
        <li>
            <a href="{% url 'pet_detail' favourite.pet.id %}">
                {{ favourite.pet.name }}
            </a>
            - {{ favourite.pet.breed }}
        </li>
    {% empty %}
        <li>You have no favourite pets yet.</li>
    {% endfor %}
</ul>

<a href="{% url 'pet_list' %}">Back to pets</a>
