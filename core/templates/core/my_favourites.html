{% extends 'core/base.html' %}

{% block content %}
<h1 class="text-3xl font-bold text-gray-800 mb-6 border-b pb-2">
    My Favourite Pets
</h1>

<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
    {% for favourite in favourites %}
        <div class="bg-white rounded-xl shadow-md p-4 hover:shadow-lg transition">

            {% if favourite.pet.image %}
                <img src="{{ favourite.pet.image.url }}" 
                     alt="{{ favourite.pet.name }}" 
                     class="w-full h-48 object-cover rounded-lg mb-4">
            {% endif %}

            <a href="{% url 'pet_detail' favourite.pet.id %}">
                <h2 class="text-xl font-semibold text-pink-600 hover:text-pink-700">
                    {{ favourite.pet.name }}
                </h2>
            </a>

            <p class="text-gray-600 mt-1">
                {{ favourite.pet.breed }}
            </p>

            <div class="mt-4">
                <a href="{% url 'toggle_favourite' favourite.pet.id %}" 
                   class="bg-yellow-100 text-yellow-700 px-3 py-1 rounded-lg hover:bg-yellow-200">
                    Remove
                </a>
            </div>

        </div>
    {% empty %}
        <p class="text-gray-600">You have no favourite pets yet.</p>
    {% endfor %}
</div>

<div class="mt-6">
    <a href="{% url 'pet_list' %}" class="text-pink-600 hover:underline">
        ← Back to pets
    </a>
</div>

{% endblock %}
